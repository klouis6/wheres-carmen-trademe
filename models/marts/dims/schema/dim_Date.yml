version: 2
models:
  - name: dim_Date
    description: Information regarding date of the year

    columns:
      - name: date_day_id
        description: ID of unique date
        data_type: INT

      - name: date_day
        description: Date of the year
        data_type: DATE
        
      - name: year
        description: Year of the date
        data_type: INT
      
      - name: month
        description: Month of the year
        data_type: INT
        
      - name: day
        description: Day of the month
        data_type: INT