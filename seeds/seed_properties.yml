version: 2
seeds:
  - name: seed_carmen_sightings__africa
    description: Populate this seed with the parameters used in the dbt_project.yml file for Africa Region
    config:
      column_types:
        date_witness: date
        witness: string
        agent: string
        date_agent: date
        city_agent: string
        country_code: string
        city: string
        latitude: float
        longitude: float
        has_weapon: boolean
        has_hat: boolean
        has_jacket: boolean
        behavior: string
    columns:
      - name: date_witness
        description: Date of witness sighting
      - name: witness
        description: Name of witness sighting the perpetrator
      - name: agent
        description: Name of field agent filing the report
      - name: date_agent
        description: Date of field agent filing the report
      - name: city_agent
        description: HQ city where field agent files the report
      - name: country_code
        description: Country of sighting
      - name: city
        description: City of sighting
      - name: latitude
        description: Latitude of sighting
      - name: longitude
        description: Longitude of sighting
      - name: has_weapon
        description: Was the perpetrator observed to be armed?
      - name: has_hat
        description: Was the perpetrator wearing a hat?
      - name: has_jacket
        description: Was the perpetrator wearing a jacket?
      - name: behavior
